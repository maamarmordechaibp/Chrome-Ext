name: Release

# Build and publish the auto-updating extension whenever you push a version tag,
# e.g.  git tag v1.0.9  &&  git push origin v1.0.9
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (.crx + update.xml)
        env:
          # Store the contents of key.pem as a repository secret named
          # CRX_PRIVATE_KEY so the extension ID stays constant across releases.
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: npm run package

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/extension.crx
            release/update.xml
            release/dist.zip
            release/install-policy.reg
