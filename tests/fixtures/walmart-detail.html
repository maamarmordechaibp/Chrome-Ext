<!DOCTYPE html>
<html lang="en">
  <head><title>Walmart Product</title></head>
  <body>
    <h1 itemprop="name">Mainstays Soft Cotton Bath Towel, Solid White</h1>
    <span itemprop="brand">Mainstays</span>
    <div data-testid="price-wrap"><span itemprop="price">$5.98</span></div>
    <span class="strike-through">$8.98</span>
    <span class="rating-number">4.5</span>
    <span itemprop="reviewCount">312</span>

    <div data-testid="hero-image"><img data-testid="media-thumbnail-image" src="https://i5.walmartimages.com/asr/towel-main.jpg?odnHeight=640" /></div>
    <div data-testid="media-thumbnail"><img src="https://i5.walmartimages.com/asr/towel-alt1.jpg?odnHeight=80" /></div>
    <div data-testid="media-thumbnail"><img src="https://i5.walmartimages.com/asr/towel-alt2.jpg?odnHeight=80" /></div>

    <div data-testid="product-description">
      <ul>
        <li>100% ring-spun cotton for softness and absorbency</li>
        <li>Machine washable and quick drying</li>
      </ul>
    </div>

    <table class="specification-table">
      <tr><th>Material</th><td>100% Cotton</td></tr>
      <tr><th>Dimensions</th><td>27 x 52 inches</td></tr>
      <tr><th>Care</th><td>Machine wash cold</td></tr>
    </table>

    <div data-testid="variant-selector">
      <label>Color</label>
      <button aria-label="White"></button>
      <button aria-label="Gray"></button>
      <button aria-label="Navy"></button>
    </div>
  </body>
</html>
